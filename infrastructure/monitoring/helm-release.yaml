apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "87.6.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
  values:
    fullnameOverride: kps

    # k3s bundles controller-manager/scheduler/etcd/kube-proxy differently
    # than vanilla kubeadm clusters - their ServiceMonitors would just show
    # as permanently-down targets here, so disable rather than chase false alerts.
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false

    prometheus:
      prometheusSpec:
        retention: 24h
        retentionSize: "2GB"
        scrapeInterval: 30s
        resources:
          requests: { cpu: 100m, memory: 256Mi }
          limits: { cpu: 500m, memory: 512Mi }
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 3Gi

    alertmanager:
      alertmanagerSpec:
        resources:
          requests: { cpu: 50m, memory: 64Mi }
          limits: { cpu: 100m, memory: 128Mi }
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 1Gi

    grafana:
      resources:
        requests: { cpu: 50m, memory: 128Mi }
        limits: { cpu: 200m, memory: 256Mi }
      persistence:
        enabled: true
        storageClassName: local-path
        size: 1Gi
