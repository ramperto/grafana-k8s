apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-cluster-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Portfolio"
data:
  cluster-overview.json: |
    {
      "title": "Cluster Overview (as-code)",
      "uid": "cluster-overview-portfolio",
      "timezone": "browser",
      "schemaVersion": 39,
      "panels": [
        {
          "id": 1,
          "title": "CPU Usage per Node",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Memory Usage per Node",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "Pods Running per Node",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "count by (node) (kube_pod_info)",
              "legendFormat": "{{node}}"
            }
          ]
        },
        {
          "id": 4,
          "title": "Cluster Pod Count (total)",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            { "expr": "count(kube_pod_info)" }
          ]
        }
      ]
    }
